# Foral CLI — Release Automation via release-please
#
# Analisa Conventional Commits e cria:
# - Release PR com CHANGELOG
# - Tag SemVer automática
# - GitHub Release ao merge
#
# Standard: SemVer 2.0.0 + Conventional Commits 1.0.0

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
          package-name: foral-cli
